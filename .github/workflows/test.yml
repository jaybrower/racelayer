# Test
# ────
# Runs `npm test` (Vitest) on every PR and on pushes to main/release branches.
# Pure-logic unit tests only — no Electron, no rendering, no telemetry.
#
# See docs/test-plan.md for the manual checks that complement this suite.

name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/v*'

permissions:
  contents: read

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
